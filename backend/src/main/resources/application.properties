spring.application.name=backend

# 비밀값 주입.
# - .env (프로젝트 루트, gitignore) 가 있으면 자동 로드 (있는 줄만 properties 로 파싱)
# - 없으면 환경변수만 사용 (optional: 가 누락 허용)
spring.config.import=optional:file:./.env[.properties]


# === DataSource ===
spring.datasource.url=jdbc:mysql://localhost:3306/vori?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# === JPA / Hibernate ===
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# === Flyway ===
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# === Session ===
server.servlet.session.timeout=1h
spring.jpa.open-in-view=false

# === Gemini API ===
# .env 의 GEMINI_API_KEY 환경변수로부터 주입. 미정의면 빈 값 → 부팅은 되고 호출 시점에 401.
# GEMINI_API_KEY 가 우선. 없으면 GOOGLE_API_KEY 도 받음 (.env 의 기존 키 이름 호환).
gemini.api.key=${GEMINI_API_KEY:${GOOGLE_API_KEY:}}